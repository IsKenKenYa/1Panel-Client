name: Experimental Prerelease

on:
  push:
    branches:
      - 'experimental/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: experimental-prerelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve Preview Metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${VERSION%%+*}
          BRANCH_SLUG=${GITHUB_REF_NAME//\//-}
          TAG_NAME=preview-${BRANCH_SLUG}-${GITHUB_RUN_NUMBER}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Widget Smoke Test
        run: flutter test test/widget_test.dart --no-pub

      - name: Build Android Preview APK
        run: |
          flutter build apk --release \
            --build-name="${{ steps.meta.outputs.version_name }}" \
            --build-number="${{ github.run_number }}"
          cp build/app/outputs/flutter-apk/app-release.apk \
            build/1panel-client-preview-${{ steps.meta.outputs.branch_slug }}.apk

      - name: Upload Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1panel-client-preview-${{ steps.meta.outputs.branch_slug }}
          path: build/1panel-client-preview-${{ steps.meta.outputs.branch_slug }}.apk

      - name: Publish GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: Preview ${{ github.ref_name }} · ${{ steps.meta.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          body: |
            Experimental preview build for collecting feedback.

            - Branch: `${{ github.ref_name }}`
            - Version: `${{ steps.meta.outputs.version }}`
            - Channel: `experimental`
            - Suggested feedback path: GitHub Issues / Discussions
          files: |
            build/1panel-client-preview-${{ steps.meta.outputs.branch_slug }}.apk
