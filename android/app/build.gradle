plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def resolveSigningValue = { String propertyKey, String envKey ->
    def envValue = System.getenv(envKey)
    if (envValue != null && !envValue.trim().isEmpty()) {
        return envValue.trim()
    }
    def propertyValue = keystoreProperties[propertyKey]
    if (propertyValue == null) {
        return null
    }
    def normalized = propertyValue.toString().trim()
    if (normalized.isEmpty() || normalized.startsWith("REPLACE_WITH_")) {
        return null
    }
    return normalized
}

def releaseStoreFilePath = resolveSigningValue("storeFile", "ANDROID_KEYSTORE_PATH")
def releaseKeyAlias = resolveSigningValue("keyAlias", "ANDROID_KEY_ALIAS")
def releaseKeyPassword = resolveSigningValue("keyPassword", "ANDROID_KEY_PASSWORD")
def releaseStorePassword = resolveSigningValue("storePassword", "ANDROID_KEYSTORE_PASSWORD")
def hasReleaseSigning = [
    releaseStoreFilePath,
    releaseKeyAlias,
    releaseKeyPassword,
    releaseStorePassword,
].every { it != null }

android {
    namespace = "com.iskenkenya.onepanel"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.iskenkenya.onepanel"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
                storeFile rootProject.file(releaseStoreFilePath)
                storePassword releaseStorePassword
            }
        }
    }

    buildTypes {
        release {
            // Use upload keystore when signing data is available; otherwise fallback for local preview.
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
